<!doctype html><html lang="fr"><head><meta charset="utf-8">
<style>
  @font-face{font-family:'Great Vibes';src:url('gv.ttf') format('truetype');font-display:block}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  .card{position:relative;width:1200px;height:630px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;overflow:hidden;
    font-family:Georgia,'Times New Roman',serif}
  .card::before{content:"";position:absolute;inset:0;z-index:0;
    background:linear-gradient(180deg,rgba(255,255,255,.74)0%,rgba(251,233,239,.82)45%,rgba(251,239,242,.96)100%),
      url('_cover.jpg') center/cover no-repeat}
  .card>*{position:relative;z-index:1}
  .heart{color:#C24C66;font-size:44px;line-height:1;filter:drop-shadow(0 2px 6px rgba(194,76,102,.35))}
  .names{font-family:'Great Vibes',cursive;color:#B06A82;font-size:132px;line-height:1.02;
    margin:6px 0 4px;text-shadow:0 2px 18px rgba(255,255,255,.7)}
  .sub{font-size:30px;letter-spacing:.05em;color:#6b5560;margin-bottom:22px}
  .rule{width:150px;height:2px;background:linear-gradient(90deg,transparent,#C9A24B,transparent);margin:6px 0 22px}
  .date{font-size:34px;font-weight:600;color:#6b5560;letter-spacing:.02em}
  .venue{font-size:24px;color:#9b8892;margin-top:8px}
  .pill{margin-top:30px;display:inline-block;font-size:20px;letter-spacing:.14em;text-transform:uppercase;
    color:#fff;background:linear-gradient(135deg,#E39BAE,#C24C66);padding:14px 34px;border-radius:999px;
    box-shadow:0 12px 26px -12px rgba(194,76,102,.75)}
</style></head>
<body>
  <div class="card">
    <div class="heart">&#9829;</div>
    <div class="names">Falencie &amp; Martin</div>
    <div class="sub">Nous nous marions</div>
    <div class="rule"></div>
    <div class="date">12 Septembre 2026 &middot; 11h00</div>
    <div class="venue">Orix H&ocirc;tel &middot; Ouanaminthe, Ha&iuml;ti</div>
    <div class="pill">Appuyez pour ouvrir &#128140;</div>
  </div>
</body></html>
